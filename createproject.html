<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Create Project — Genesis Incubation Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:#e31b2d; --red-dim:#b81424; --red-glow:rgba(227,27,45,.18);
      --font-display:"Bricolage Grotesque",system-ui,sans-serif;
      --font-body:"Source Sans 3",system-ui,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
    }
    html[data-theme="dark"]  { --bg:#000000; --bg-2:#0c0c0e; --bg-3:#141418; --text:#f4f4f5; --text-2:#a1a1aa; --text-3:#71717a; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16); --card:#0c0c0e; --input-bg:#080809; }
    html[data-theme="light"] { --bg:#ffffff; --bg-2:#f6f6f7; --bg-3:#ececee; --text:#0a0a0b; --text-2:#52525b; --text-3:#71717a; --line:rgba(0,0,0,.09); --line-strong:rgba(0,0,0,.15); --card:#ffffff; --input-bg:#ffffff; }
    html.theme-anim,html.theme-anim * { transition:background-color .4s var(--ease),color .4s var(--ease),border-color .4s var(--ease) !important; }
    *,*::before,*::after { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:var(--font-body); font-size:1rem; line-height:1.6; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden; }
    img  { max-width:100%; height:auto; display:block; }
    a    { color:inherit; text-decoration:none; }
    button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .page-loader { position:fixed; inset:0; z-index:3000; display:grid; place-items:center; background:var(--bg); transition:opacity .55s var(--ease),visibility .55s; }
    .page-loader.is-done { opacity:0; visibility:hidden; pointer-events:none; }
    .loader-ring  { width:52px; height:52px; border-radius:50%; border:1px solid var(--line); border-top-color:var(--red); box-shadow:0 0 32px var(--red-glow); animation:spin 1.1s linear infinite; }
    .loader-label { margin-top:1rem; font-size:.75rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); animation:pulse 1.6s ease infinite; }
    .loader-inner { display:grid; place-items:center; gap:.5rem; }
    #toast-root { position:fixed; top:1.25rem; right:1.25rem; z-index:4000; display:grid; gap:.5rem; width:min(380px,calc(100% - 2rem)); pointer-events:none; }
    .toast { pointer-events:auto; display:flex; align-items:center; gap:.65rem; padding:.85rem 1rem; background:var(--bg-2); border:1px solid var(--line); border-radius:6px; font-size:.875rem; color:var(--text); box-shadow:0 8px 32px rgba(0,0,0,.25); cursor:pointer; opacity:0; transform:translateX(20px); transition:opacity .32s var(--ease),transform .32s var(--ease); }
    .toast.in { opacity:1; transform:translateX(0); }

    .dash-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:100; }
    .dash-logo   { height:36px; width:auto; filter:brightness(0) invert(1); }
    html[data-theme="light"] .dash-logo { filter:none; }
    .dash-header-right { display:flex; align-items:center; gap:.75rem; }
    .theme-btn-dash { width:36px; height:36px; border:1px solid var(--line-strong); border-radius:4px; display:grid; place-items:center; font-size:.9rem; color:var(--text-2); transition:border-color .2s,color .2s; }
    .theme-btn-dash:hover { border-color:var(--red); color:var(--red); }
    .logout-btn { padding:.4rem .85rem; border:1px solid var(--line-strong); border-radius:4px; font-size:.75rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2); transition:border-color .2s,color .2s; }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }

    .dash-body { max-width:720px; margin:0 auto; padding:3rem 2rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important; }
    .dash-eyebrow { font-size:.6875rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--red); margin-bottom:.5rem; display:flex; align-items:center; gap:.5rem; }
    .dash-eyebrow::before { content:''; width:20px; height:2px; background:var(--red); }
    .dash-title { font-family:var(--font-display); font-size:clamp(1.6rem,3vw,2.4rem); font-weight:800; letter-spacing:-.03em; line-height:1.1; margin:0 0 2rem; }

    /* Back */
    .back-btn { display:inline-flex; align-items:center; gap:.5rem; font-size:.8rem; font-weight:600; color:var(--text-3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:2rem; transition:color .2s; cursor:pointer; border:none; background:none; padding:0; }
    .back-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .back-btn:hover { color:var(--red); }

    /* Form section */
    .dash-section { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:1.75rem; margin-bottom:1.5rem; }
    .dash-section-title { font-family:var(--font-display); font-size:1rem; font-weight:700; margin:0 0 1.25rem; display:flex; align-items:center; gap:.5rem; }
    .dash-section-title::before { content:''; width:3px; height:1em; background:var(--red); border-radius:2px; }
    .form-grid { display:grid; gap:.85rem; }
    .field { display:grid; gap:.35rem; }
    .field label { font-size:.7rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-3); }
    .field input,.field select,.field textarea { width:100%; padding:.72rem .9rem; border:1px solid var(--line-strong); border-radius:4px; background:var(--input-bg); color:var(--text); font:inherit; font-size:.9375rem; transition:border-color .2s,box-shadow .2s; appearance:none; }
    .field textarea { resize:vertical; min-height:110px; line-height:1.6; }
    .field input:focus,.field select:focus,.field textarea:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(227,27,45,.12); }
    .field input::placeholder,.field textarea::placeholder { color:var(--text-3); }
    .field.has-error input,.field.has-error select,.field.has-error textarea { border-color:var(--red); }
    .field-note { font-size:.75rem; color:var(--text-3); margin-top:.2rem; }
    .field-pair { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .save-btn { padding:.75rem 1.5rem; background:var(--red); color:#fff; font:inherit; font-size:.875rem; font-weight:700; letter-spacing:.04em; border-radius:4px; border:none; cursor:pointer; transition:background .2s,transform .15s; }
    .save-btn:hover { background:var(--red-dim); }
    .save-btn:active { transform:scale(.98); }
    .save-btn:disabled { opacity:.5; cursor:not-allowed; }

    /* Tech tags */
    .tag-input-wrap { display:flex; flex-wrap:wrap; gap:.4rem; padding:.5rem .6rem; border:1px solid var(--line-strong); border-radius:4px; background:var(--input-bg); cursor:text; min-height:46px; align-items:center; transition:border-color .2s,box-shadow .2s; }
    .tag-input-wrap:focus-within { border-color:var(--red); box-shadow:0 0 0 3px rgba(227,27,45,.12); }
    .tag-chip { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .55rem; background:rgba(227,27,45,.1); border:1px solid rgba(227,27,45,.2); border-radius:4px; font-size:.8rem; font-weight:600; color:var(--red); }
    .tag-chip-remove { width:14px; height:14px; border-radius:50%; background:rgba(227,27,45,.2); display:grid; place-items:center; cursor:pointer; font-size:.7rem; color:var(--red); border:none; line-height:1; }
    .tag-chip-remove:hover { background:rgba(227,27,45,.4); }
    .tag-text-input { border:none; background:transparent; color:var(--text); font:inherit; font-size:.875rem; outline:none; flex:1; min-width:120px; padding:.15rem .2rem; }
    .tag-text-input::placeholder { color:var(--text-3); }

    /* Bottom nav */
    .bottom-nav { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:200; height:calc(3.75rem + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:var(--bg-2); border-top:1px solid var(--line-strong); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%); }
    .bn-inner { width:100%; display:flex; align-items:stretch; }
    .bn-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.22rem; padding:.55rem .25rem .45rem; cursor:pointer; border:none; background:none; color:var(--text-3); font-family:var(--font-body); font-size:.6rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; text-decoration:none; -webkit-tap-highlight-color:transparent; position:relative; transition:color .2s var(--ease); }
    .bn-item:active { transform:scale(.88); }
    .bn-item.is-active { color:var(--red); }
    .bn-item.is-active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2px; background:var(--red); border-radius:0 0 3px 3px; }
    .bn-icon { width:26px; height:26px; display:grid; place-items:center; border-radius:6px; transition:background .2s var(--ease),transform .2s var(--ease); }
    .bn-item:hover .bn-icon { background:rgba(227,27,45,.1); transform:translateY(-1px); }
    .bn-item.is-active .bn-icon { background:rgba(227,27,45,.12); }
    .bn-icon svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-icon svg { stroke-width:2.25; }
    .bn-badge { position:absolute; top:.45rem; left:calc(50% + 3px); min-width:14px; height:14px; padding:0 3px; background:var(--red); color:#fff; font-size:.5rem; font-weight:700; line-height:14px; text-align:center; border-radius:7px; border:1.5px solid var(--bg-2); display:none; }
    .bn-badge.visible { display:block; }
    .bn-avatar { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1.5px solid var(--line-strong); display:block; }
    .bn-avatar-default { width:26px; height:26px; border-radius:50%; background:var(--bg-3); border:1.5px solid var(--line-strong); display:grid; place-items:center; }
    .bn-avatar-default svg { width:14px; height:14px; stroke:var(--text-3); fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-avatar-default svg { stroke:var(--red); }

    @media (max-width:800px) {
      .dash-header{padding:1rem;} .dash-body{padding:2rem 1rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important;}
      .field-pair{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="page-loader" id="page-loader">
  <div class="loader-inner"><div class="loader-ring"></div><div class="loader-label">Loading…</div></div>
</div>
<div id="toast-root" aria-live="polite"></div>

<header class="dash-header">
  <a href="dashboard.html">
    <img class="dash-logo" src="https://cdn.imageurlgenerator.com/uploads/7a3264f2-9a1f-4fe7-a124-da445f285aab.png" alt="Genesis Incubation Centre" width="180" height="44" />
  </a>
  <div class="dash-header-right">
    <button class="theme-btn-dash" id="theme-toggle" aria-label="Toggle theme"><span id="theme-icon">☾</span></button>
    <button class="logout-btn" id="logout-btn">Log out</button>
  </div>
</header>

<div class="dash-body">
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Dashboard
  </button>
  <p class="dash-eyebrow">My Projects</p>
  <h1 class="dash-title">Create a Project</h1>

  <!-- Basic Info -->
  <div class="dash-section">
    <h2 class="dash-section-title">Basic Information</h2>
    <div class="form-grid">
      <div class="field-pair">
        <div class="field" id="f-name">
          <label for="p-name">Project Name <span style="color:var(--red)">*</span></label>
          <input type="text" id="p-name" placeholder="e.g. AgroSense" maxlength="80" />
        </div>
        <div class="field" id="f-category">
          <label for="p-category">Category <span style="color:var(--red)">*</span></label>
          <select id="p-category">
            <option value="">Select category…</option>
            <option>AgriTech</option>
            <option>HealthTech</option>
            <option>EdTech</option>
            <option>CleanTech</option>
            <option>FinTech</option>
            <option>Deep Tech</option>
            <option>SaaS</option>
            <option>IoT</option>
            <option>AI / ML</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="field" id="f-desc">
        <label for="p-desc">Project Description <span style="color:var(--red)">*</span></label>
        <textarea id="p-desc" placeholder="Describe your project — what problem does it solve, who is the target user, and what is your approach?"></textarea>
      </div>
    </div>
  </div>

  <!-- Team & Tech -->
  <div class="dash-section">
    <h2 class="dash-section-title">Team &amp; Technology</h2>
    <div class="form-grid">
      <div class="field">
        <label for="p-members">Team Members</label>
        <input type="text" id="p-members" placeholder="e.g. Arjun Sharma, Priya Mehta, Rohan Das" />
        <div class="field-note">Comma-separated names of all team members</div>
      </div>
      <div class="field">
        <label>Technologies Used</label>
        <div class="tag-input-wrap" id="tech-tag-wrap">
          <input class="tag-text-input" id="tech-tag-input" type="text" placeholder="Type a technology and press Enter…" />
        </div>
        <div class="field-note">Press Enter or comma to add each technology</div>
      </div>
    </div>
  </div>

  <!-- Links -->
  <div class="dash-section">
    <h2 class="dash-section-title">Links</h2>
    <div class="form-grid">
      <div class="field-pair">
        <div class="field">
          <label for="p-github">GitHub Link</label>
          <input type="url" id="p-github" placeholder="https://github.com/your-repo" />
        </div>
        <div class="field">
          <label for="p-demo">Demo Link <span style="color:var(--text-3); font-weight:400; text-transform:none; letter-spacing:0;">(optional)</span></label>
          <input type="url" id="p-demo" placeholder="https://your-demo.vercel.app" />
        </div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:1rem;flex-wrap:wrap;">
    <button class="save-btn" id="submit-btn">Submit Project</button>
    <button class="logout-btn" id="cancel-btn" style="padding:.75rem 1.25rem;">Cancel</button>
  </div>
</div>

<nav class="bottom-nav" aria-label="Mobile navigation">
  <div class="bn-inner">
    <a class="bn-item is-active" href="index.html" data-bn="home"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span><span>Home</span></a>
    <a class="bn-item" href="search.html" data-bn="search"><span class="bn-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><span>Search</span></a>
    <a class="bn-item" href="news.html" data-bn="news"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14H12M18 10H12M18 18H12"/></svg></span><span>News</span></a>
    <a class="bn-item" href="notification.html" data-bn="notifs"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span><span class="bn-badge" id="bn-badge">3</span><span>Alerts</span></a>
    <a class="bn-item" data-bn="profile" id="bn-profile-tab" href="dashboard.html"><span class="bn-avatar-default" id="bn-avatar-default"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Profile</span></a>
  </div>
</nav>

<script type="module">
const SESSION_KEY  = 'gic_session';
const PROJECTS_KEY = 'gic_projects';

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch { return null; }
}
function clearSession() { sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(SESSION_KEY); }

/*
 * PROJECT STORAGE — LocalStorage wrapper (swap for Supabase later)
 * Future: const { error } = await supabase.from('projects').insert([projectData]);
 */
function getProjects(email) {
  try { return JSON.parse(localStorage.getItem(PROJECTS_KEY + '_' + email) || '[]'); }
  catch { return []; }
}
function saveProject(email, project) {
  const projects = getProjects(email);
  projects.push(project);
  localStorage.setItem(PROJECTS_KEY + '_' + email, JSON.stringify(projects));
}

function toast(msg, type = 'info') {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  el.innerHTML = `<span style="color:${type==='error'?'var(--red)':type==='success'?'#22c55e':'var(--text-2)'}">${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.add('in'));
  el.addEventListener('click', () => el.remove());
  setTimeout(() => { el.classList.remove('in'); setTimeout(() => el.remove(), 350); }, 3500);
}

function initTheme() {
  const saved = localStorage.getItem('gic_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const i = document.getElementById('theme-icon');
  if (i) i.textContent = saved === 'dark' ? '☀' : '☾';
  document.getElementById('theme-toggle')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.classList.add('theme-anim');
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gic_theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀' : '☾';
    setTimeout(() => document.documentElement.classList.remove('theme-anim'), 500);
  });
}

/* ── Tech tag chips ── */
let techTags = [];

function renderTags() {
  const wrap = document.getElementById('tech-tag-wrap');
  const input = document.getElementById('tech-tag-input');
  // Remove old chips
  wrap.querySelectorAll('.tag-chip').forEach(c => c.remove());
  techTags.forEach((tag, idx) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${tag}<button class="tag-chip-remove" data-idx="${idx}" aria-label="Remove ${tag}">×</button>`;
    wrap.insertBefore(chip, input);
  });
  wrap.querySelectorAll('.tag-chip-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      techTags.splice(+btn.dataset.idx, 1);
      renderTags();
    });
  });
}

function initTagInput() {
  const input = document.getElementById('tech-tag-input');
  const wrap  = document.getElementById('tech-tag-wrap');

  wrap.addEventListener('click', () => input.focus());

  input.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ',') && input.value.trim()) {
      e.preventDefault();
      const val = input.value.replace(',','').trim();
      if (val && !techTags.includes(val)) { techTags.push(val); renderTags(); }
      input.value = '';
    }
    if (e.key === 'Backspace' && !input.value && techTags.length) {
      techTags.pop(); renderTags();
    }
  });

  input.addEventListener('blur', () => {
    const val = input.value.replace(',','').trim();
    if (val && !techTags.includes(val)) { techTags.push(val); renderTags(); input.value = ''; }
  });
}

/* ── Validation ── */
function validate() {
  let valid = true;
  const clearErr = id => document.getElementById(id)?.classList.remove('has-error');
  const setErr   = id => { document.getElementById(id)?.classList.add('has-error'); valid = false; };

  ['f-name','f-category','f-desc'].forEach(clearErr);

  const name = document.getElementById('p-name').value.trim();
  const cat  = document.getElementById('p-category').value;
  const desc = document.getElementById('p-desc').value.trim();

  if (!name) setErr('f-name');
  if (!cat)  setErr('f-category');
  if (!desc) setErr('f-desc');

  if (!valid) toast('Please fill in all required fields.', 'error');
  return valid ? { name, cat, desc } : null;
}

/* ── Submit ── */
function initForm(session) {
  document.getElementById('submit-btn')?.addEventListener('click', async () => {
    const data = validate();
    if (!data) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    const project = {
      id:          Date.now(),
      name:        data.name,
      category:    data.cat,
      description: data.desc,
      members:     document.getElementById('p-members').value.trim(),
      technologies: techTags,
      githubLink:  document.getElementById('p-github').value.trim(),
      demoLink:    document.getElementById('p-demo').value.trim(),
      status:      'Draft',
      createdAt:   new Date().toISOString(),
      ownerEmail:  session.email,
      ownerName:   session.username || session.email,
    };

    /* Save to localStorage (swap body below for Supabase insert later):
     * const { error } = await supabase.from('projects').insert([project]);
     * if (error) throw new Error(error.message);
     */
    await new Promise(r => setTimeout(r, 600)); // simulate async
    saveProject(session.email, project);

    toast('Project submitted successfully!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  });
}

function initNavAvatar(session) {
  if (!session?.avatar) return;
  const def = document.getElementById('bn-avatar-default');
  if (!def) return;
  const img = document.createElement('img');
  img.className = 'bn-avatar'; img.src = session.avatar; img.alt = 'Profile';
  def.replaceWith(img);
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  const session = getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  initNavAvatar(session);
  initTagInput();
  initForm(session);

  document.getElementById('back-btn')?.addEventListener('click', () => window.location.href = 'dashboard.html');
  document.getElementById('cancel-btn')?.addEventListener('click', () => window.location.href = 'dashboard.html');
  document.getElementById('logout-btn')?.addEventListener('click', () => { clearSession(); window.location.href = 'login.html'; });

  const loader = document.getElementById('page-loader');
  if (loader) { loader.classList.add('is-done'); loader.setAttribute('aria-hidden','true'); }
});
</script>
</body>
</html>
