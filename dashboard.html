<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Dashboard — Genesis Incubation Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Root tokens (match login.html exactly) ── */
    :root {
      --red: #e31b2d; --red-dim: #b81424; --red-glow: rgba(227,27,45,.18);
      --font-display: "Bricolage Grotesque", system-ui, sans-serif;
      --font-body:    "Source Sans 3", system-ui, sans-serif;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    html[data-theme="dark"]  { --bg:#000000; --bg-2:#0c0c0e; --bg-3:#141418; --text:#f4f4f5; --text-2:#a1a1aa; --text-3:#71717a; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16); --card:#0c0c0e; --input-bg:#080809; }
    html[data-theme="light"] { --bg:#ffffff; --bg-2:#f6f6f7; --bg-3:#ececee; --text:#0a0a0b; --text-2:#52525b; --text-3:#71717a; --line:rgba(0,0,0,.09); --line-strong:rgba(0,0,0,.15); --card:#ffffff; --input-bg:#ffffff; }
    html.theme-anim, html.theme-anim * { transition: background-color .4s var(--ease), color .4s var(--ease), border-color .4s var(--ease) !important; }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: var(--font-body); font-size: 1rem; line-height: 1.6; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden; }
    img  { max-width: 100%; height: auto; display: block; }
    a    { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ── Loader (same as login.html) ── */
    .page-loader { position: fixed; inset: 0; z-index: 3000; display: grid; place-items: center; background: var(--bg); transition: opacity .55s var(--ease), visibility .55s; }
    .page-loader.is-done { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring  { width: 52px; height: 52px; border-radius: 50%; border: 1px solid var(--line); border-top-color: var(--red); box-shadow: 0 0 32px var(--red-glow); animation: spin 1.1s linear infinite; }
    .loader-label { margin-top: 1rem; font-size: .75rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-3); animation: pulse 1.6s ease infinite; }
    .loader-inner { display: grid; place-items: center; gap: .5rem; }

    /* ── Toast (same as login.html) ── */
    #toast-root { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 4000; display: grid; gap: .5rem; width: min(380px, calc(100% - 2rem)); pointer-events: none; }
    .toast { pointer-events: auto; display: flex; align-items: center; gap: .65rem; padding: .85rem 1rem; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; font-size: .875rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.25); cursor: pointer; opacity: 0; transform: translateX(20px); transition: opacity .32s var(--ease), transform .32s var(--ease); }
    .toast.in { opacity: 1; transform: translateX(0); }

    /* ── Dashboard layout ── */
    .dash-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--line); background: var(--bg); position: sticky; top: 0; z-index: 100; }
    .dash-logo   { height: 36px; width: auto; filter: var(--logo-filter, brightness(0) invert(1)); }
    html[data-theme="light"] .dash-logo { filter: none; }
    .dash-header-right { display: flex; align-items: center; gap: .75rem; }
    .theme-btn-dash { width: 36px; height: 36px; border: 1px solid var(--line-strong); border-radius: 4px; display: grid; place-items: center; font-size: .9rem; color: var(--text-2); transition: border-color .2s, color .2s; }
    .theme-btn-dash:hover { border-color: var(--red); color: var(--red); }
    .logout-btn { padding: .4rem .85rem; border: 1px solid var(--line-strong); border-radius: 4px; font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-2); transition: border-color .2s, color .2s; }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .dash-body { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }
    .dash-welcome { margin-bottom: 2.5rem; }
    .dash-eyebrow { font-size: .6875rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--red); margin-bottom: .5rem; display: flex; align-items: center; gap: .5rem; }
    .dash-eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--red); }
    .dash-title  { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; letter-spacing: -.03em; line-height: 1.1; margin: 0; }

    .dash-grid { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }

    /* ── Profile card ── */
    .profile-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 2rem 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1rem; height: fit-content; }
    .avatar-wrap  { position: relative; width: 96px; height: 96px; }
    .avatar-img   { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 2px solid var(--line-strong); }
    .avatar-placeholder { width: 96px; height: 96px; border-radius: 50%; background: var(--bg-3); border: 2px solid var(--line-strong); display: grid; place-items: center; font-size: 2.5rem; }
    .avatar-upload-btn  { position: absolute; bottom: 0; right: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--red); color: #fff; font-size: .8rem; border: 2px solid var(--bg); display: grid; place-items: center; cursor: pointer; transition: background .2s; }
    .avatar-upload-btn:hover { background: var(--red-dim); }
    #avatar-file-input { display: none; }

    .profile-name    { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; margin: 0; }
    .profile-email   { font-size: .875rem; color: var(--text-3); margin: 0; }
    .profile-role    { display: inline-flex; align-items: center; gap: .35rem; padding: .25rem .6rem; background: rgba(227,27,45,.1); border: 1px solid rgba(227,27,45,.2); border-radius: 4px; font-size: .7rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--red); }
    .profile-divider { width: 100%; height: 1px; background: var(--line); }
    .profile-detail  { width: 100%; display: grid; gap: .5rem; text-align: left; }
    .profile-detail-item { display: flex; flex-direction: column; gap: .1rem; }
    .profile-detail-label { font-size: .65rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }
    .profile-detail-value { font-size: .875rem; color: var(--text-2); }

    /* ── Settings / main area ── */
    .dash-main { display: grid; gap: 1.5rem; }
    .dash-section { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 1.75rem; }
    .dash-section-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; margin: 0 0 1.25rem; display: flex; align-items: center; gap: .5rem; }
    .dash-section-title::before { content: ''; width: 3px; height: 1em; background: var(--red); border-radius: 2px; }

    .field { display: grid; gap: .35rem; }
    .field label { font-size: .7rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); }
    .field input, .field select { width: 100%; padding: .72rem .9rem; border: 1px solid var(--line-strong); border-radius: 4px; background: var(--input-bg); color: var(--text); font: inherit; font-size: .9375rem; transition: border-color .2s, box-shadow .2s; appearance: none; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,27,45,.12); }

    .field-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .save-btn { margin-top: 1rem; padding: .75rem 1.5rem; background: var(--red); color: #fff; font: inherit; font-size: .875rem; font-weight: 700; letter-spacing: .04em; border-radius: 4px; border: none; cursor: pointer; transition: background .2s, transform .15s; }
    .save-btn:hover { background: var(--red-dim); }
    .save-btn:active { transform: scale(.98); }

    .activity-list { display: grid; gap: .75rem; }
    .activity-item { display: flex; align-items: flex-start; gap: .75rem; padding: .85rem; background: var(--bg-2); border-radius: 6px; border: 1px solid var(--line); }
    .activity-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: .45rem; }
    .activity-text { font-size: .875rem; color: var(--text-2); }
    .activity-time { font-size: .75rem; color: var(--text-3); margin-top: .15rem; }

    /* ── Phone (contact link) ── */
    .dash-contact-link { color: var(--red); font-weight: 600; }
    .dash-contact-link:hover { text-decoration: underline; }

    @media (max-width: 800px) {
      .dash-grid  { grid-template-columns: 1fr; }
      .field-pair { grid-template-columns: 1fr; }
      .dash-header { padding: 1rem; }
      .dash-body  { padding: 2rem 1rem; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }

    /* ═══════════════════════════════════════════════════
       BOTTOM NAV — always visible, fixed at bottom
    ═══════════════════════════════════════════════════ */

    /* Push page content up so last card isn't hidden behind nav */
    .dash-body { padding-bottom: calc(5rem + env(safe-area-inset-bottom, 0px)) !important; }

    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      height: calc(3.75rem + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--bg-2);
      border-top: 1px solid var(--line-strong);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
    }

    .bn-inner {
      width: 100%;
      display: flex;
      align-items: stretch;
    }

    .bn-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .22rem;
      padding: .55rem .25rem .45rem;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-3);
      font-family: var(--font-body);
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      /* tap highlight off */
      -webkit-tap-highlight-color: transparent;
      position: relative;
      transition: color .2s var(--ease);
      /* scale-down on tap */
      will-change: transform;
    }

    .bn-item:active {
      transform: scale(.88);
      transition: transform .1s var(--ease), color .2s var(--ease);
    }

    /* Active state */
    .bn-item.is-active {
      color: var(--red);
    }

    /* Active indicator pill above icon */
    .bn-item.is-active::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 28px; height: 2px;
      background: var(--red);
      border-radius: 0 0 3px 3px;
      animation: bn-pill-in .28s var(--ease) both;
    }

    @keyframes bn-pill-in {
      from { width: 0; opacity: 0; }
      to   { width: 28px; opacity: 1; }
    }

    /* Icon wrapper — carries the hover glow */
    .bn-icon {
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 6px;
      transition: background .2s var(--ease), transform .2s var(--ease);
    }

    .bn-item:hover .bn-icon {
      background: rgba(227,27,45,.1);
      transform: translateY(-1px);
    }

    .bn-item.is-active .bn-icon {
      background: rgba(227,27,45,.12);
    }

    .bn-icon svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform .2s var(--ease);
    }

    .bn-item.is-active .bn-icon svg {
      stroke-width: 2.25;
    }

    /* Notification badge */
    .bn-badge {
      position: absolute;
      top: .45rem; left: calc(50% + 3px);
      min-width: 14px; height: 14px;
      padding: 0 3px;
      background: var(--red);
      color: #fff;
      font-size: .5rem;
      font-weight: 700;
      line-height: 14px;
      text-align: center;
      border-radius: 7px;
      border: 1.5px solid var(--bg-2);
      display: none;
      animation: bn-badge-pop .3s var(--ease) both;
    }
    .bn-badge.visible { display: block; }

    @keyframes bn-badge-pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    /* Profile avatar in nav tab */
    .bn-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--line-strong);
      transition: border-color .2s var(--ease), transform .2s var(--ease);
      display: block;
    }

    .bn-item:hover .bn-avatar,
    .bn-item.is-active .bn-avatar {
      border-color: var(--red);
      transform: translateY(-1px);
    }

    .bn-avatar-default {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--bg-3);
      border: 1.5px solid var(--line-strong);
      display: grid; place-items: center;
      transition: border-color .2s var(--ease), transform .2s var(--ease);
    }

    .bn-item:hover .bn-avatar-default,
    .bn-item.is-active .bn-avatar-default {
      border-color: var(--red);
      transform: translateY(-1px);
    }

    .bn-avatar-default svg {
      width: 14px; height: 14px;
      stroke: var(--text-3);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bn-item.is-active .bn-avatar-default svg { stroke: var(--red); }
  </style>
</head>
<body>

<div class="page-loader" id="page-loader" aria-hidden="false">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-label">Loading dashboard…</div>
  </div>
</div>

<div id="toast-root" aria-live="polite"></div>

<header class="dash-header">
  <a href="index.html">
    <img class="dash-logo" src="https://cdn.imageurlgenerator.com/uploads/7a3264f2-9a1f-4fe7-a124-da445f285aab.png" alt="Genesis Incubation Centre" width="180" height="44" />
  </a>
  <div class="dash-header-right">
    <button class="theme-btn-dash" id="theme-toggle" aria-label="Toggle theme">
      <span id="theme-icon">☾</span>
    </button>
    <button class="logout-btn" id="logout-btn">Log out</button>
  </div>
</header>

<div class="dash-body">
  <div class="dash-welcome">
    <p class="dash-eyebrow">Member Portal</p>
    <h1 class="dash-title" id="welcome-title">Welcome back</h1>
  </div>

  <div class="dash-grid">
    <!-- Profile card -->
    <aside class="profile-card">
      <div class="avatar-wrap">
        <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
        <img class="avatar-img" id="avatar-img" src="" alt="Profile picture" style="display:none;" />
        <label class="avatar-upload-btn" for="avatar-file-input" title="Change photo">✎</label>
        <input type="file" id="avatar-file-input" accept="image/*" />
      </div>
      <p class="profile-name"  id="profile-name">—</p>
      <p class="profile-email" id="profile-email">—</p>
      <span class="profile-role" id="profile-role">—</span>
      <div class="profile-divider"></div>
      <div class="profile-detail" id="profile-detail">
        <!-- populated by JS -->
      </div>
    </aside>

    <!-- Main area -->
    <div class="dash-main">
      <!-- Settings -->
      <section class="dash-section">
        <h2 class="dash-section-title">Profile settings</h2>
        <div style="display:grid;gap:.85rem;">
          <div class="field-pair">
            <div class="field">
              <label for="s-username">Display name</label>
              <input type="text" id="s-username" placeholder="Your name" />
            </div>
            <div class="field">
              <label for="s-email">Email</label>
              <input type="email" id="s-email" placeholder="you@college.edu" />
            </div>
          </div>
          <div class="field-pair" id="student-fields">
            <div class="field">
              <label for="s-dept">Department</label>
              <select id="s-dept">
                <option value="">Select department…</option>
                <option>Computer Science</option>
                <option>Electronics &amp; Systems</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Business &amp; Management</option>
                <option>External / Industry</option>
              </select>
            </div>
            <div class="field">
              <label for="s-year">Year of study</label>
              <select id="s-year">
                <option value="">Select year…</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
              </select>
            </div>
          </div>
          <div class="field" id="mentor-branch-field" style="display:none;">
            <label for="s-branch">Specialisation / Branch</label>
            <input type="text" id="s-branch" placeholder="e.g. Electronics &amp; IoT" />
          </div>
          <div class="field-pair">
            <div class="field">
              <label for="s-phone">Contact number</label>
              <input type="tel" id="s-phone" placeholder="+91 98765 43210" />
            </div>
          </div>
          <button class="save-btn" id="save-btn">Save changes</button>
        </div>
      </section>

      <!-- Activity log -->
      <section class="dash-section">
        <h2 class="dash-section-title">Recent activity</h2>
        <div class="activity-list" id="activity-list">
          <!-- populated by JS -->
        </div>
      </section>

      <!-- Contact -->
      <section class="dash-section">
        <h2 class="dash-section-title">GIC contact</h2>
        <p style="font-size:.9375rem;color:var(--text-2);margin:0 0 .75rem;">
          Reach the Genesis Incubation Centre team directly:
        </p>
        <p style="margin:0;font-size:.9375rem;">
          📧 <a href="mailto:gic@genesis.edu.in" class="dash-contact-link">gic@genesis.edu.in</a>
        </p>
        <p style="margin:.4rem 0 0;font-size:.9375rem;">
          📞 <a href="tel:+919823591454" class="dash-contact-link" id="contact-phone">+91-98235 91454</a>
        </p>
      </section>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     BOTTOM NAV — mobile only (≤800px via CSS)
════════════════════════════════════════════ -->
<nav class="bottom-nav" id="bottom-nav" aria-label="Mobile navigation">

    <!-- Home -->
    <a class="bn-item" href="index.html" data-bn="home" aria-label="Home">
      <span class="bn-icon">

          <circle cx="11" cy="11" r="8"/>

    <!-- News -->
    <a class="bn-item" href="news.html" data-bn="news" aria-label="News">

          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span>Profile</span>
    </a>

  </div>
</nav>

<script type="module">
/* ── Auth helpers ── */
const SESSION_KEY = 'gic_session';
const USERS_KEY   = 'gic_users';

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch { return null; }
}
function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || '{}'); }
  catch { return {}; }
}
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function updateSession(session) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
  if (localStorage.getItem(SESSION_KEY)) localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}
function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
  localStorage.removeItem(SESSION_KEY);
}

function toast(msg, type = 'info') {
  const root = document.getElementById('toast-root');
  if (!root) return;
  const el = document.createElement('div');
  el.className = 'toast';
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  el.innerHTML = `<span class="toast-icon" style="color:${type==='error'?'var(--red)':type==='success'?'#22c55e':'var(--text-2)'}">${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.add('in'));
  el.addEventListener('click', () => el.remove());
  setTimeout(() => { el.classList.remove('in'); setTimeout(() => el.remove(), 350); }, 3500);
}

function dismissLoader() {
  const l = document.getElementById('page-loader');
  if (l) { l.classList.add('is-done'); l.setAttribute('aria-hidden','true'); }
}

/* ── Theme ── */
function initTheme() {
  const saved = localStorage.getItem('gic_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);
  document.getElementById('theme-toggle')?.addEventListener('click', () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.classList.add('theme-anim');
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gic_theme', next);
    updateThemeIcon(next);
    setTimeout(() => document.documentElement.classList.remove('theme-anim'), 500);
  });
}
function updateThemeIcon(t) {
  const i = document.getElementById('theme-icon');
  if (i) i.textContent = t === 'dark' ? '☀' : '☾';
}

/* ── Populate UI ── */
function populateDashboard(session) {
  const roleLabelMap = { student: '🎓 Student', mentor: '🧑‍🏫 Mentor', user: '👤 User' };

  document.getElementById('welcome-title').textContent =
    `Welcome back, ${session.username || session.email}`;

  document.getElementById('profile-name').textContent  = session.username || '—';
  document.getElementById('profile-email').textContent = session.email    || '—';
  document.getElementById('profile-role').textContent  = roleLabelMap[session.role] || session.role || '—';

  /* Avatar */
  const placeholder = document.getElementById('avatar-placeholder');
  const img         = document.getElementById('avatar-img');
  if (session.avatar) {
    img.src = session.avatar;
    img.style.display = '';
    placeholder.style.display = 'none';
  }

  /* Profile detail list */
  const detail = document.getElementById('profile-detail');
  const items = [];
  if (session.department) items.push({ label: 'Department', value: session.department });
  if (session.year)       items.push({ label: 'Year', value: ordinal(session.year) + ' Year' });
  if (session.branch)     items.push({ label: 'Branch', value: session.branch });
  if (session.phone)      items.push({ label: 'Phone', value: session.phone, href: 'tel:' + session.phone.replace(/\s/g,'') });
  if (session.createdAt)  items.push({ label: 'Member since', value: new Date(session.createdAt).toLocaleDateString('en-IN', { year:'numeric', month:'long' }) });

  detail.innerHTML = items.map(it => `
    <div class="profile-detail-item">
      <span class="profile-detail-label">${it.label}</span>
      <span class="profile-detail-value">${it.href ? `<a href="${it.href}" class="dash-contact-link">${it.value}</a>` : it.value}</span>
    </div>`).join('');

  /* Pre-fill settings form */
  document.getElementById('s-username').value = session.username   || '';
  document.getElementById('s-email').value    = session.email      || '';
  document.getElementById('s-dept').value     = session.department || '';
  document.getElementById('s-year').value     = session.year       || '';
  document.getElementById('s-branch').value   = session.branch     || '';
  document.getElementById('s-phone').value    = session.phone      || '';

  /* Show/hide role-specific fields */
  const isStudent = session.role === 'student';
  const isMentor  = session.role === 'mentor';
  document.getElementById('student-fields').style.display      = isStudent ? '' : 'none';
  document.getElementById('mentor-branch-field').style.display = isMentor  ? '' : 'none';

  /* Activity log */
  const activities = JSON.parse(localStorage.getItem('gic_activity_' + session.email) || '[]');
  if (!activities.length) activities.push({ text: 'Account created', time: session.createdAt || new Date().toISOString() });
  document.getElementById('activity-list').innerHTML = activities
    .slice(-5).reverse()
    .map(a => `<div class="activity-item">
      <div class="activity-dot"></div>
      <div><div class="activity-text">${a.text}</div><div class="activity-time">${timeAgo(a.time)}</div></div>
    </div>`).join('');
}

function ordinal(n) {
  const s = ['', '1st', '2nd', '3rd', '4th'];
  return s[+n] || n;
}
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'Just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

/* ── Save settings ── */
function initSaveSettings(session) {
  document.getElementById('save-btn')?.addEventListener('click', () => {
    const users = getUsers();
    const updated = {
      ...session,
      username:   document.getElementById('s-username').value.trim() || session.username,
      email:      document.getElementById('s-email').value.trim()    || session.email,
      department: document.getElementById('s-dept').value,
      year:       document.getElementById('s-year').value,
      branch:     document.getElementById('s-branch').value.trim(),
      phone:      document.getElementById('s-phone').value.trim(),
    };

    /* Update stored user & session */
    users[session.email] = { ...users[session.email], ...updated };
    saveUsers(users);
    updateSession(updated);

    /* Log activity */
    logActivity(session.email, 'Profile settings updated');

    toast('Settings saved!', 'success');
    populateDashboard(updated);
  });
}

/* ── Avatar upload ── */
function initAvatarUpload(session) {
  document.getElementById('avatar-file-input')?.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      /* Update UI immediately */
      const img = document.getElementById('avatar-img');
      img.src = dataUrl;
      img.style.display = '';
      document.getElementById('avatar-placeholder').style.display = 'none';

      /* Persist */
      const users = getUsers();
      if (users[session.email]) users[session.email].avatar = dataUrl;
      saveUsers(users);
      const updated = { ...session, avatar: dataUrl };
      updateSession(updated);
      logActivity(session.email, 'Profile picture updated');
      toast('Profile picture updated!', 'success');
    };
    reader.readAsDataURL(file);
  });
}

/* ── Activity log ── */
function logActivity(email, text) {
  const key   = 'gic_activity_' + email;
  const log   = JSON.parse(localStorage.getItem(key) || '[]');
  log.push({ text, time: new Date().toISOString() });
  if (log.length > 20) log.shift();
  localStorage.setItem(key, JSON.stringify(log));
}

/* ── Logout ── */
function initLogout() {
  document.getElementById('logout-btn')?.addEventListener('click', () => {
    clearSession();
    window.location.href = 'login.html';
  });
}

/* ── Bottom Nav ── */
function initBottomNav(session) {
  const items = document.querySelectorAll('.bn-item');

  // Mark the Profile tab as active (we're on the dashboard/profile page)
  items.forEach(item => {
    if (item.dataset.bn === 'profile') item.classList.add('is-active');
  });

  // Inject user avatar into Profile tab if available
  const profileTab    = document.getElementById('bn-profile-tab');
  const defaultAvatar = document.getElementById('bn-avatar-default');
  if (session?.avatar && profileTab && defaultAvatar) {
    const img = document.createElement('img');
    img.className = 'bn-avatar';
    img.src       = session.avatar;
    img.alt       = 'Your profile picture';
    defaultAvatar.replaceWith(img);
  }

  // Show notification badge
  const badge = document.getElementById('bn-badge');
  if (badge) badge.classList.add('visible');

  // Tap interactions — ripple scale already handled by CSS :active
  items.forEach(item => {
    item.addEventListener('click', function () {
      // Clear all active states
      items.forEach(i => i.classList.remove('is-active'));
      // Set clicked as active
      this.classList.add('is-active');

      // Scroll to profile section if profile tab tapped
      if (this.dataset.bn === 'profile') {
        document.querySelector('.profile-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      // Dismiss notification badge when alerts tab tapped
      if (this.dataset.bn === 'notifs') {
        const b = document.getElementById('bn-badge');
        if (b) b.classList.remove('visible');
      }
    });
  });

  // Keep avatar in sync when user uploads a new one
  const avatarInput = document.getElementById('avatar-file-input');
  if (avatarInput) {
    avatarInput.addEventListener('change', () => {
      // Small delay to let the main handler update session first
      setTimeout(() => {
        const fresh = getSession();
        if (!fresh?.avatar) return;
        const tab     = document.getElementById('bn-profile-tab');
        const current = tab?.querySelector('.bn-avatar-default, .bn-avatar');
        if (!current) return;
        const img = document.createElement('img');
        img.className = 'bn-avatar';
        img.src       = fresh.avatar;
        img.alt       = 'Your profile picture';
        current.replaceWith(img);
      }, 300);
    });
  }
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  initTheme();

  const session = getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }

  logActivity(session.email, 'Signed in');
  populateDashboard(session);
  initSaveSettings(session);
  initAvatarUpload(session);
  initLogout();
  initBottomNav(session);
  dismissLoader();
});
</script>
