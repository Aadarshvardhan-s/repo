<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Login — Genesis Incubation Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --red:          #e31b2d;
      --red-dim:      #b81424;
      --red-glow:     rgba(227,27,45,.18);
      --font-display: "Bricolage Grotesque", system-ui, sans-serif;
      --font-body:    "Source Sans 3", system-ui, sans-serif;
      --ease:         cubic-bezier(.22,1,.36,1);
      --ease-in:      cubic-bezier(.4,0,1,1);
    }
    html[data-theme="dark"] {
      --bg:           #000000;
      --bg-2:         #0c0c0e;
      --bg-3:         #141418;
      --text:         #f4f4f5;
      --text-2:       #a1a1aa;
      --text-3:       #71717a;
      --line:         rgba(255,255,255,.08);
      --line-strong:  rgba(255,255,255,.16);
      --card:         #0c0c0e;
      --input-bg:     #080809;
      --logo-filter:  brightness(0) invert(1);
    }
    html[data-theme="light"] {
      --bg:           #ffffff;
      --bg-2:         #f6f6f7;
      --bg-3:         #ececee;
      --text:         #0a0a0b;
      --text-2:       #52525b;
      --text-3:       #71717a;
      --line:         rgba(0,0,0,.09);
      --line-strong:  rgba(0,0,0,.15);
      --card:         #ffffff;
      --input-bg:     #ffffff;
      --logo-filter:  none;
    }
    html.theme-anim, html.theme-anim * {
      transition: background-color .4s var(--ease), color .4s var(--ease), border-color .4s var(--ease) !important;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    img   { max-width: 100%; height: auto; display: block; }
    a     { color: inherit; text-decoration: none; }
    button{ font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

    .page-loader {
      position: fixed; inset: 0; z-index: 3000;
      display: grid; place-items: center;
      background: var(--bg);
      transition: opacity .55s var(--ease), visibility .55s;
    }
    .page-loader.is-done { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring {
      width: 52px; height: 52px; border-radius: 50%;
      border: 1px solid var(--line);
      border-top-color: var(--red);
      box-shadow: 0 0 32px var(--red-glow);
      animation: spin 1.1s linear infinite;
    }
    .loader-label {
      margin-top: 1rem;
      font-size: .75rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-3);
      animation: pulse 1.6s ease infinite;
    }
    .loader-inner { display: grid; place-items: center; gap: .5rem; }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .art-panel {
      position: relative;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem;
    }
    .art-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .6;
    }
    .art-orbs {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      pointer-events: none;
    }
    .art-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(227,27,45,.22);
    }
    .art-ring-1 { width: 320px; height: 320px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: ring-pulse 4s ease infinite; box-shadow: inset 0 0 60px rgba(227,27,45,.06); }
    .art-ring-2 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: ring-pulse 4s ease infinite .6s; border-color: rgba(227,27,45,.12); }
    .art-ring-3 { width: 700px; height: 700px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: ring-pulse 4s ease infinite 1.2s; border-color: rgba(227,27,45,.06); }
    @keyframes ring-pulse { 0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(1); } 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.025); } }
    .art-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: var(--red); top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 40px 12px rgba(227,27,45,.4); animation: dot-breathe 3s ease infinite; }
    @keyframes dot-breathe { 0%,100%{ box-shadow:0 0 40px 12px rgba(227,27,45,.4); } 50%{ box-shadow:0 0 60px 20px rgba(227,27,45,.6); } }
    .art-corner { position: absolute; width: 40px; height: 40px; }
    .art-corner-tl { top: 2.5rem; left: 2.5rem; border-top: 2px solid var(--red); border-left: 2px solid var(--red); }
    .art-corner-br { bottom: 2.5rem; right: 2.5rem; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); }
    .art-badge { position: absolute; bottom: 6rem; left: 2.5rem; display: flex; align-items: center; gap: .65rem; padding: .55rem .9rem; background: rgba(227,27,45,.12); border: 1px solid rgba(227,27,45,.28); border-radius: 4px; font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--red); animation: badge-float 3s ease infinite; }
    .art-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: dot-breathe 1.5s ease infinite; }
    @keyframes badge-float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
    .art-top { position: relative; z-index: 1; }
    .art-logo { height: 38px; width: auto; filter: brightness(0) invert(1); margin-bottom: 1rem; }
    .art-tagline { font-size: .75rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.35); }
    .art-bottom { position: relative; z-index: 1; }
    .art-title { font-family: var(--font-display); font-size: clamp(1.75rem, 2.8vw, 2.5rem); font-weight: 800; letter-spacing: -.03em; line-height: 1.1; color: #fff; margin: 0 0 1rem; }
    .art-title em { font-style: normal; color: var(--red); }
    .art-desc { font-size: .9375rem; color: rgba(255,255,255,.45); max-width: 34ch; margin: 0; line-height: 1.55; }
    .form-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2rem; background: var(--bg); position: relative; overflow-y: auto; }
    .form-panel-topbar { position: absolute; top: 1.5rem; right: 1.75rem; display: flex; align-items: center; gap: .6rem; }
    .home-btn { display: flex; align-items: center; gap: .5rem; padding: .4rem .85rem; border: 1px solid var(--line-strong); border-radius: 4px; font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-2); transition: border-color .2s, color .2s; }
    .home-btn:hover { border-color: var(--red); color: var(--red); }
    .theme-btn { width: 36px; height: 36px; border: 1px solid var(--line-strong); border-radius: 4px; display: grid; place-items: center; font-size: .9rem; color: var(--text-2); transition: border-color .2s, color .2s; }
    .theme-btn:hover { border-color: var(--red); color: var(--red); }
    .form-box { width: min(440px, 100%); }
    .form-eyebrow { font-size: .6875rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--red); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem; }
    .form-eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--red); }
    .form-heading { font-family: var(--font-display); font-size: clamp(1.6rem, 3vw, 2.1rem); font-weight: 800; letter-spacing: -.03em; line-height: 1.1; margin: 0 0 .4rem; color: var(--text); }
    .form-sub { font-size: .9rem; color: var(--text-3); margin: 0 0 2rem; }
    .role-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; margin-bottom: 1.75rem; }
    .role-tab { padding: .65rem .5rem; text-align: center; font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: var(--bg-2); color: var(--text-3); cursor: pointer; transition: background .2s, color .2s; position: relative; user-select: none; }
    .role-tab:hover { color: var(--text-2); }
    .role-tab.active { background: var(--red); color: #fff; }
    .role-tab .role-icon { display: block; font-size: 1.1rem; margin-bottom: .2rem; }
    .field-group { display: grid; gap: .85rem; margin-bottom: 1.25rem; }
    .field { display: grid; gap: .35rem; }
    .field label { font-size: .7rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); }
    .field input, .field select { width: 100%; padding: .82rem .9rem; border: 1px solid var(--line-strong); border-radius: 4px; background: var(--input-bg); color: var(--text); font: inherit; font-size: .9375rem; transition: border-color .2s, box-shadow .2s; appearance: none; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,27,45,.12); }
    .field-row { display: flex; align-items: center; justify-content: space-between; font-size: .875rem; }
    .check { display: flex; align-items: center; gap: .5rem; color: var(--text-2); cursor: pointer; }
    .check input[type="checkbox"] { accent-color: var(--red); }
    .forgot-link { color: var(--red); font-weight: 600; font-size: .875rem; }
    .forgot-link:hover { text-decoration: underline; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.75rem; }
    .pw-toggle { position: absolute; right: .8rem; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: .85rem; cursor: pointer; padding: .2rem; transition: color .2s; }
    .pw-toggle:hover { color: var(--text); }
    .submit-btn { width: 100%; padding: .9rem 1.5rem; background: var(--red); color: #fff; font: inherit; font-size: .9375rem; font-weight: 700; letter-spacing: .04em; border-radius: 4px; border: none; cursor: pointer; position: relative; overflow: hidden; transition: background .2s, transform .15s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .submit-btn:hover { background: var(--red-dim); }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.28); pointer-events: none; transform: translate(-50%,-50%) scale(0); }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.1rem 0; font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .oauth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    .oauth-btn { display: flex; align-items: center; justify-content: center; gap: .5rem; padding: .7rem 1rem; border: 1px solid var(--line-strong); border-radius: 4px; font-size: .8125rem; font-weight: 600; color: var(--text-2); transition: border-color .2s, color .2s, background .2s; }
    .oauth-btn:hover { border-color: var(--text-3); color: var(--text); background: var(--bg-2); }
    .oauth-btn svg { flex-shrink: 0; }
    .auth-switch { margin-top: 1.5rem; text-align: center; font-size: .875rem; color: var(--text-3); }
    .auth-switch a { color: var(--red); font-weight: 600; }
    .auth-switch a:hover { text-decoration: underline; }
    .form-body { animation: slide-up .45s var(--ease) both; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .btn-spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; animation: spin .7s linear infinite; display: none; }
    .art-scan { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px); pointer-events: none; opacity: .4; }
    #toast-root { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 4000; display: grid; gap: .5rem; width: min(380px, calc(100% - 2rem)); pointer-events: none; }
    .toast { pointer-events: auto; display: flex; align-items: center; gap: .65rem; padding: .85rem 1rem; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; font-size: .875rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.25); cursor: pointer; opacity: 0; transform: translateX(20px); transition: opacity .32s var(--ease), transform .32s var(--ease); }
    .toast.in { opacity: 1; transform: translateX(0); }
    .toast-icon { font-size: 1rem; font-weight: 700; flex-shrink: 0; }
    @media (max-width: 860px) { .page { grid-template-columns: 1fr; } .art-panel { display: none; } .form-panel { padding: 2rem 1.25rem; min-height: 100vh; } .form-panel-topbar { top: 1rem; right: 1rem; } #toast-root { left: 1rem; right: 1rem; width: auto; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
<div class="page-loader" id="page-loader" aria-hidden="false">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-label">Genesis Portal</div>
  </div>
</div>

<script>
  // Fallback: automatically dismiss the loader after 2.5 seconds if the main module script fails to load/execute
  setTimeout(function() {
    var loader = document.getElementById('page-loader');
    if (loader && !loader.classList.contains('is-done')) {
      loader.classList.add('is-done');
      loader.setAttribute('aria-hidden', 'true');
      console.warn('Page loader dismissed by inline fallback script.');
    }
  }, 2500);
</script>

<div id="toast-root" aria-live="polite"></div>

<div class="page">
  <aside class="art-panel">
    <div class="art-grid"></div>
    <div class="art-scan"></div>
    <div class="art-orbs">
      <div class="art-dot"></div>
      <div class="art-ring art-ring-1"></div>
      <div class="art-ring art-ring-2"></div>
      <div class="art-ring art-ring-3"></div>
    </div>
    <div class="art-corner art-corner-tl"></div>
    <div class="art-corner art-corner-br"></div>
    <div class="art-badge">
      <span class="art-badge-dot"></span>
      Portal Active
    </div>
    <div class="art-top">
      <img class="art-logo" src="https://cdn.imageurlgenerator.com/uploads/7a3264f2-9a1f-4fe7-a124-da445f285aab.png" alt="Genesis Incubation Centre" />
      <p class="art-tagline">Member Portal · GEC</p>
    </div>
    <div class="art-bottom">
      <h1 class="art-title">
        Build.<br /><em>Review.</em><br />Ship.
      </h1>
      <p class="art-desc">
        One portal. Every team, mentor, and user on the same rhythm.
      </p>
    </div>
  </aside>

  <main class="form-panel">
    <div class="form-panel-topbar">
      <a href="index.html" class="home-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
        Home
      </a>
      <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <span id="theme-icon">☾</span>
      </button>
    </div>

    <div class="form-box">
      <div class="form-body" id="form-body">
        <p class="form-eyebrow">Access Portal</p>
        <h2 class="form-heading" id="form-heading">Welcome back</h2>
        <p class="form-sub" id="form-sub">Sign in to your account to continue.</p>

        <div class="role-tabs" role="tablist" aria-label="Account type">
          <button class="role-tab active" role="tab" aria-selected="true"  data-role="student" id="tab-student">
            <span class="role-icon">🎓</span>Student
          </button>
          <button class="role-tab" role="tab" aria-selected="false" data-role="mentor"  id="tab-mentor">
            <span class="role-icon">🧑‍🏫</span>Mentor
          </button>
          <button class="role-tab" role="tab" aria-selected="false" data-role="user"   id="tab-user">
            <span class="role-icon">👤</span>User
          </button>
        </div>

        <form id="login-form" novalidate autocomplete="on">
          <div class="field-group" id="main-fields">
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" autocomplete="email" placeholder="you@college.edu" required />
            </div>
            <div class="field" id="username-field" style="display:none;">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" autocomplete="username" placeholder="Choose a username" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="pw-wrap">
                <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
                <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show/hide password">👁</button>
              </div>
            </div>
            <div class="field" id="dept-field" style="display:none;">
              <label for="department">Department</label>
              <select id="department" name="department">
                <option value="">Select department…</option>
                <option>Computer Science</option>
                <option>Electronics & Systems</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Business & Management</option>
                <option>External / Industry</option>
              </select>
            </div>
          </div>

          <div class="field-row" style="margin-bottom:1.25rem;">
            <label class="check">
              <input type="checkbox" name="remember" id="remember" />
              Remember me
            </label>
            <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn" data-ripple>
            <div class="btn-spinner" id="btn-spinner"></div>
            <span id="submit-label">Sign in</span>
          </button>
        </form>

        <div id="oauth-section">
          <div class="divider">or</div>
          <div class="oauth-grid">
            <button class="oauth-btn" id="google-btn">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Google
            </button>
            <button class="oauth-btn" id="github-btn">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path fill="currentColor" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
              </svg>
              GitHub
            </button>
          </div>
        </div>

        <p class="auth-switch" id="auth-switch">
          New here? <a href="#" id="mode-toggle">Create an account</a>
        </p>
      </div>
    </div>
  </main>
</div>

<script type="module" src="./js/portal.js"></script>
</body>
</html>
