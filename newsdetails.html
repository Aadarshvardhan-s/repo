<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>News Detail — Genesis Incubation Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:#e31b2d; --red-dim:#b81424; --red-glow:rgba(227,27,45,.18);
      --font-display:"Bricolage Grotesque",system-ui,sans-serif;
      --font-body:"Source Sans 3",system-ui,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
    }
    html[data-theme="dark"]  { --bg:#000000; --bg-2:#0c0c0e; --bg-3:#141418; --text:#f4f4f5; --text-2:#a1a1aa; --text-3:#71717a; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16); --card:#0c0c0e; --input-bg:#080809; }
    html[data-theme="light"] { --bg:#ffffff; --bg-2:#f6f6f7; --bg-3:#ececee; --text:#0a0a0b; --text-2:#52525b; --text-3:#71717a; --line:rgba(0,0,0,.09); --line-strong:rgba(0,0,0,.15); --card:#ffffff; --input-bg:#ffffff; }
    html.theme-anim,html.theme-anim * { transition:background-color .4s var(--ease),color .4s var(--ease),border-color .4s var(--ease) !important; }
    *,*::before,*::after { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:var(--font-body); font-size:1rem; line-height:1.6; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden; }
    img  { max-width:100%; height:auto; display:block; }
    a    { color:inherit; text-decoration:none; }
    button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .page-loader { position:fixed; inset:0; z-index:3000; display:grid; place-items:center; background:var(--bg); transition:opacity .55s var(--ease),visibility .55s; }
    .page-loader.is-done { opacity:0; visibility:hidden; pointer-events:none; }
    .loader-ring  { width:52px; height:52px; border-radius:50%; border:1px solid var(--line); border-top-color:var(--red); box-shadow:0 0 32px var(--red-glow); animation:spin 1.1s linear infinite; }
    .loader-label { margin-top:1rem; font-size:.75rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); animation:pulse 1.6s ease infinite; }
    .loader-inner { display:grid; place-items:center; gap:.5rem; }

    .dash-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:100; }
    .dash-logo   { height:36px; width:auto; filter:brightness(0) invert(1); }
    html[data-theme="light"] .dash-logo { filter:none; }
    .dash-header-right { display:flex; align-items:center; gap:.75rem; }
    .theme-btn-dash { width:36px; height:36px; border:1px solid var(--line-strong); border-radius:4px; display:grid; place-items:center; font-size:.9rem; color:var(--text-2); transition:border-color .2s,color .2s; }
    .theme-btn-dash:hover { border-color:var(--red); color:var(--red); }
    .logout-btn { padding:.4rem .85rem; border:1px solid var(--line-strong); border-radius:4px; font-size:.75rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2); transition:border-color .2s,color .2s; }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }

    .dash-body { max-width:720px; margin:0 auto; padding:3rem 2rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important; }

    /* Back button */
    .back-btn { display:inline-flex; align-items:center; gap:.5rem; font-size:.8rem; font-weight:600; color:var(--text-3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:2rem; transition:color .2s; cursor:pointer; border:none; background:none; padding:0; }
    .back-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .back-btn:hover { color:var(--red); }

    /* Article */
    .article-hero { width:100%; height:220px; background:linear-gradient(135deg,rgba(227,27,45,.18) 0%,rgba(227,27,45,.04) 100%); border:1px solid var(--line); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:5rem; margin-bottom:2rem; }
    .article-tag  { display:inline-flex; padding:.2rem .6rem; background:rgba(227,27,45,.1); border:1px solid rgba(227,27,45,.2); border-radius:4px; font-size:.65rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--red); margin-bottom:.85rem; }
    .article-title { font-family:var(--font-display); font-size:clamp(1.5rem,4vw,2rem); font-weight:800; letter-spacing:-.025em; line-height:1.2; margin:0 0 1rem; }
    .article-meta { display:flex; align-items:center; gap:.75rem; font-size:.8rem; color:var(--text-3); margin-bottom:2rem; flex-wrap:wrap; }
    .article-meta-dot { width:3px; height:3px; border-radius:50%; background:var(--text-3); }
    .article-divider { width:100%; height:1px; background:var(--line); margin-bottom:2rem; }
    .article-body { font-size:1rem; color:var(--text-2); line-height:1.8; white-space:pre-line; }
    .article-body p { margin:0 0 1.25rem; }

    /* Related section */
    .related-label { font-size:.7rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin:2.5rem 0 1rem; display:flex; align-items:center; gap:.5rem; }
    .related-label::after { content:''; flex:1; height:1px; background:var(--line); }
    .related-card { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:1.1rem 1.25rem; display:flex; gap:.85rem; cursor:pointer; transition:border-color .2s,transform .2s; margin-bottom:.75rem; }
    .related-card:hover { border-color:var(--line-strong); transform:translateX(2px); }
    .related-card-emoji { font-size:1.5rem; flex-shrink:0; }
    .related-card-title { font-family:var(--font-display); font-size:.875rem; font-weight:700; margin:0; line-height:1.3; }
    .related-card-meta  { font-size:.75rem; color:var(--text-3); margin-top:.2rem; }

    /* Bottom nav */
    .bottom-nav { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:200; height:calc(3.75rem + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:var(--bg-2); border-top:1px solid var(--line-strong); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%); }
    .bn-inner { width:100%; display:flex; align-items:stretch; }
    .bn-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.22rem; padding:.55rem .25rem .45rem; cursor:pointer; border:none; background:none; color:var(--text-3); font-family:var(--font-body); font-size:.6rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; text-decoration:none; -webkit-tap-highlight-color:transparent; position:relative; transition:color .2s var(--ease); }
    .bn-item:active { transform:scale(.88); }
    .bn-item.is-active { color:var(--red); }
    .bn-item.is-active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2px; background:var(--red); border-radius:0 0 3px 3px; }
    .bn-icon { width:26px; height:26px; display:grid; place-items:center; border-radius:6px; transition:background .2s var(--ease),transform .2s var(--ease); }
    .bn-item:hover .bn-icon { background:rgba(227,27,45,.1); transform:translateY(-1px); }
    .bn-item.is-active .bn-icon { background:rgba(227,27,45,.12); }
    .bn-icon svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-icon svg { stroke-width:2.25; }
    .bn-badge { position:absolute; top:.45rem; left:calc(50% + 3px); min-width:14px; height:14px; padding:0 3px; background:var(--red); color:#fff; font-size:.5rem; font-weight:700; line-height:14px; text-align:center; border-radius:7px; border:1.5px solid var(--bg-2); display:none; }
    .bn-badge.visible { display:block; }
    .bn-avatar { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1.5px solid var(--line-strong); display:block; }
    .bn-avatar-default { width:26px; height:26px; border-radius:50%; background:var(--bg-3); border:1.5px solid var(--line-strong); display:grid; place-items:center; }
    .bn-avatar-default svg { width:14px; height:14px; stroke:var(--text-3); fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-avatar-default svg { stroke:var(--red); }

    @media (max-width:800px) { .dash-header{padding:1rem;} .dash-body{padding:2rem 1rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important;} }
  </style>
</head>
<body>

<div class="page-loader" id="page-loader">
  <div class="loader-inner"><div class="loader-ring"></div><div class="loader-label">Loading…</div></div>
</div>

<header class="dash-header">
  <a href="dashboard.html">
    <img class="dash-logo" src="https://cdn.imageurlgenerator.com/uploads/7a3264f2-9a1f-4fe7-a124-da445f285aab.png" alt="Genesis Incubation Centre" width="180" height="44" />
  </a>
  <div class="dash-header-right">
    <button class="theme-btn-dash" id="theme-toggle" aria-label="Toggle theme"><span id="theme-icon">☾</span></button>
    <button class="logout-btn" id="logout-btn">Log out</button>
  </div>
</header>

<div class="dash-body">
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to News
  </button>
  <div id="article-container"><!-- populated by JS --></div>
  <div id="related-container"><!-- populated by JS --></div>
</div>

<nav class="bottom-nav" aria-label="Mobile navigation">
  <div class="bn-inner">
    <a class="bn-item" href="index.html" data-bn="home"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span><span>Home</span></a>
    <a class="bn-item" href="search.html" data-bn="search"><span class="bn-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><span>Search</span></a>
    <a class="bn-item is-active" href="news.html" data-bn="news"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14H12M18 10H12M18 18H12"/></svg></span><span>News</span></a>
    <a class="bn-item" href="notification.html" data-bn="notifs"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span><span class="bn-badge" id="bn-badge">3</span><span>Alerts</span></a>
    <a class="bn-item" data-bn="profile" id="bn-profile-tab" href="dashboard.html"><span class="bn-avatar-default" id="bn-avatar-default"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Profile</span></a>
  </div>
</nav>

<script type="module">
const SESSION_KEY = 'gic_session';
function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch { return null; }
}
function clearSession() { sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(SESSION_KEY); }

function initTheme() {
  const saved = localStorage.getItem('gic_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const i = document.getElementById('theme-icon');
  if (i) i.textContent = saved === 'dark' ? '☀' : '☾';
  document.getElementById('theme-toggle')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.classList.add('theme-anim');
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gic_theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀' : '☾';
    setTimeout(() => document.documentElement.classList.remove('theme-anim'), 500);
  });
}

/* Same data — in a real app, fetch from Supabase:
 * const { data } = await supabase.from('news').select('*').eq('id', id).single();
 */
const NEWS_DATA = [
  { id:1, emoji:'🚀', tag:'Launch', title:'GIC Launches Cohort 5 — Applications Open for 2024–25', date:'2025-06-01', author:'GIC Team', readTime:'3 min read', content:`Genesis Incubation Centre is thrilled to announce the opening of applications for Cohort 5 of our flagship incubation programme for the academic year 2024–25.\n\nThis year, GIC will onboard up to 15 student-led startups across domains including AgriTech, HealthTech, EdTech, CleanTech and Deep Tech. Selected teams will receive dedicated mentorship, lab access, seed funding support, and opportunities to pitch at regional investor summits.\n\nApplications close on 30 June 2025. Shortlisted teams will be invited for a two-round selection process comprising a written application review and a live pitch session before an expert panel.\n\nVisit the GIC office in the Innovation Block or email gic@genesis.edu.in to learn more.` },
  { id:2, emoji:'🏆', tag:'Achievement', title:'Team AgroSense wins Smart India Hackathon 2024', date:'2025-05-22', author:'GIC Media Cell', readTime:'2 min read', content:`GEC's own AgroSense team, incubated at the Genesis Incubation Centre, brought home the top prize at Smart India Hackathon 2024. The team's solution, a low-cost IoT sensor network for precision irrigation, impressed judges with its real-world deployment data from a pilot farm in Punjab.\n\nThe winning team comprises five students from Computer Science and Electronics departments who spent over eight months refining their prototype under mentorship at GIC.\n\n"This win validates that campus-born ideas can solve real agricultural challenges," said team lead Arjun Sharma. The prize money of ₹1,00,000 will be used for product development and field trials.` },
  { id:3, emoji:'🎙️', tag:'Event', title:'Startup Saturday: Monthly Demo Day returns on June 15', date:'2025-05-18', author:'Events Team', readTime:'2 min read', content:`Startup Saturday is back! Join us on June 15, 2025, in the GIC Auditorium (Innovation Block, Ground Floor) for our monthly Demo Day.\n\nThis month's Demo Day will feature 8 teams from Cohort 4, including MedTrack, CampusRide, and EduBot. Audience members are welcome and refreshments will be provided.\n\nTime: 2:00 PM – 5:30 PM. Attendance is free for all Genesis College students and faculty. To register as a presenter, fill out the form at the GIC office by June 10.` },
  { id:4, emoji:'💼', tag:'Mentorship', title:"New Industry Mentors join GIC's Expert Network", date:'2025-05-10', author:'GIC Team', readTime:'2 min read', content:`We are delighted to welcome three distinguished industry leaders to the Genesis Incubation Centre's mentor network:\n\n• Ms. Anita Desai — former Product Manager at Google, now an independent entrepreneur.\n• Mr. Suresh Patel — Partner at Genesis Ventures, specialising in early-stage deep tech investments.\n• Mr. Rakesh Bose — Senior Architect at TCS, with expertise in cloud computing.\n\nMentor sessions will be held twice a month. Incubated teams can book 30-minute slots via the GIC portal.` },
  { id:5, emoji:'📢', tag:'Announcement', title:'GIC Partners with NASSCOM 10,000 Startups Programme', date:'2025-04-28', author:'GIC Team', readTime:'3 min read', content:`Genesis Incubation Centre has entered into a formal MoU with NASSCOM 10,000 Startups, one of India's largest startup ecosystem enablers.\n\nUnder this partnership, incubated teams at GIC will gain access to NASSCOM's national cohort events, curated investor introductions, go-to-market support, and cloud computing credits.\n\nBenefits are available to all active Cohort 4 and Cohort 5 teams immediately. Contact the GIC office for details.` },
  { id:6, emoji:'🔬', tag:'Research', title:'EduBot research paper accepted at ICML 2025', date:'2025-04-15', author:'GIC Media Cell', readTime:'2 min read', content:`EduBot, the AI-powered doubt-resolution system developed by third-year Computer Science students at Genesis College, has had their research paper accepted at ICML 2025.\n\nThe paper is titled "Adaptive Retrieval-Augmented Generation for Domain-Specific Educational Q&A" and demonstrates superior performance over existing chatbot-based tutoring systems.\n\nThe team will travel to Vienna in July to present their work. This marks the first ICML acceptance in the college's history.` },
];

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
}

function goToDetail(id) {
  localStorage.setItem('gic_news_selected', id);
  window.location.href = 'news-detail.html';
}
window.goToDetail = goToDetail;

function renderArticle(article, related) {
  document.title = article.title + ' — GIC';
  document.getElementById('article-container').innerHTML = `
    <div class="article-hero">${article.emoji}</div>
    <span class="article-tag">${article.tag}</span>
    <h1 class="article-title">${article.title}</h1>
    <div class="article-meta">
      <span>${formatDate(article.date)}</span>
      <span class="article-meta-dot"></span>
      <span>${article.readTime}</span>
      <span class="article-meta-dot"></span>
      <span>By ${article.author}</span>
    </div>
    <div class="article-divider"></div>
    <div class="article-body">${article.content}</div>
  `;

  if (related.length) {
    document.getElementById('related-container').innerHTML =
      `<div class="related-label">More stories</div>` +
      related.map(n => `<div class="related-card" onclick="goToDetail(${n.id})">
        <div class="related-card-emoji">${n.emoji}</div>
        <div>
          <div class="related-card-title">${n.title}</div>
          <div class="related-card-meta">${formatDate(n.date)} · ${n.readTime}</div>
        </div>
      </div>`).join('');
  }
}

function initNavAvatar(session) {
  if (!session?.avatar) return;
  const def = document.getElementById('bn-avatar-default');
  if (!def) return;
  const img = document.createElement('img');
  img.className = 'bn-avatar'; img.src = session.avatar; img.alt = 'Profile';
  def.replaceWith(img);
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  const session = getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  initNavAvatar(session);

  const id = parseInt(localStorage.getItem('gic_news_selected') || '1', 10);
  const article = NEWS_DATA.find(n => n.id === id) || NEWS_DATA[0];
  const related = NEWS_DATA.filter(n => n.id !== article.id).slice(0, 3);
  renderArticle(article, related);

  document.getElementById('back-btn')?.addEventListener('click', () => window.location.href = 'news.html');
  document.getElementById('logout-btn')?.addEventListener('click', () => { clearSession(); window.location.href = 'login.html'; });

  const loader = document.getElementById('page-loader');
  if (loader) { loader.classList.add('is-done'); loader.setAttribute('aria-hidden','true'); }
});
</script>
</body>
</html>
