<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Notifications — Genesis Incubation Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:#e31b2d; --red-dim:#b81424; --red-glow:rgba(227,27,45,.18);
      --font-display:"Bricolage Grotesque",system-ui,sans-serif;
      --font-body:"Source Sans 3",system-ui,sans-serif;
      --ease:cubic-bezier(.22,1,.36,1);
    }
    html[data-theme="dark"]  { --bg:#000000; --bg-2:#0c0c0e; --bg-3:#141418; --text:#f4f4f5; --text-2:#a1a1aa; --text-3:#71717a; --line:rgba(255,255,255,.08); --line-strong:rgba(255,255,255,.16); --card:#0c0c0e; --input-bg:#080809; }
    html[data-theme="light"] { --bg:#ffffff; --bg-2:#f6f6f7; --bg-3:#ececee; --text:#0a0a0b; --text-2:#52525b; --text-3:#71717a; --line:rgba(0,0,0,.09); --line-strong:rgba(0,0,0,.15); --card:#ffffff; --input-bg:#ffffff; }
    html.theme-anim,html.theme-anim * { transition:background-color .4s var(--ease),color .4s var(--ease),border-color .4s var(--ease) !important; }
    *,*::before,*::after { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:var(--font-body); font-size:1rem; line-height:1.6; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden; }
    img  { max-width:100%; height:auto; display:block; }
    a    { color:inherit; text-decoration:none; }
    button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .page-loader { position:fixed; inset:0; z-index:3000; display:grid; place-items:center; background:var(--bg); transition:opacity .55s var(--ease),visibility .55s; }
    .page-loader.is-done { opacity:0; visibility:hidden; pointer-events:none; }
    .loader-ring  { width:52px; height:52px; border-radius:50%; border:1px solid var(--line); border-top-color:var(--red); box-shadow:0 0 32px var(--red-glow); animation:spin 1.1s linear infinite; }
    .loader-label { margin-top:1rem; font-size:.75rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); animation:pulse 1.6s ease infinite; }
    .loader-inner { display:grid; place-items:center; gap:.5rem; }
    #toast-root { position:fixed; top:1.25rem; right:1.25rem; z-index:4000; display:grid; gap:.5rem; width:min(380px,calc(100% - 2rem)); pointer-events:none; }
    .toast { pointer-events:auto; display:flex; align-items:center; gap:.65rem; padding:.85rem 1rem; background:var(--bg-2); border:1px solid var(--line); border-radius:6px; font-size:.875rem; color:var(--text); box-shadow:0 8px 32px rgba(0,0,0,.25); cursor:pointer; opacity:0; transform:translateX(20px); transition:opacity .32s var(--ease),transform .32s var(--ease); }
    .toast.in { opacity:1; transform:translateX(0); }

    .dash-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:100; }
    .dash-logo   { height:36px; width:auto; filter:brightness(0) invert(1); }
    html[data-theme="light"] .dash-logo { filter:none; }
    .dash-header-right { display:flex; align-items:center; gap:.75rem; }
    .theme-btn-dash { width:36px; height:36px; border:1px solid var(--line-strong); border-radius:4px; display:grid; place-items:center; font-size:.9rem; color:var(--text-2); transition:border-color .2s,color .2s; }
    .theme-btn-dash:hover { border-color:var(--red); color:var(--red); }
    .logout-btn { padding:.4rem .85rem; border:1px solid var(--line-strong); border-radius:4px; font-size:.75rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2); transition:border-color .2s,color .2s; }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }

    .dash-body { max-width:780px; margin:0 auto; padding:3rem 2rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important; }
    .dash-eyebrow { font-size:.6875rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--red); margin-bottom:.5rem; display:flex; align-items:center; gap:.5rem; }
    .dash-eyebrow::before { content:''; width:20px; height:2px; background:var(--red); }
    .dash-title { font-family:var(--font-display); font-size:clamp(1.6rem,3vw,2.4rem); font-weight:800; letter-spacing:-.03em; line-height:1.1; margin:0 0 .5rem; }
    .dash-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .mark-all-btn { padding:.4rem .85rem; border:1px solid var(--line-strong); border-radius:4px; font-size:.75rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2); transition:border-color .2s,color .2s; margin-top:.25rem; flex-shrink:0; }
    .mark-all-btn:hover { border-color:var(--red); color:var(--red); }

    /* Group label */
    .notif-group-label { font-size:.7rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin:0 0 .75rem; display:flex; align-items:center; gap:.5rem; }
    .notif-group-label::after { content:''; flex:1; height:1px; background:var(--line); }
    .notif-group { margin-bottom:2rem; }

    /* Notification card */
    .notif-card { display:flex; align-items:flex-start; gap:1rem; padding:1rem 1.1rem; background:var(--card); border:1px solid var(--line); border-radius:8px; margin-bottom:.65rem; cursor:pointer; transition:border-color .2s,transform .2s; position:relative; }
    .notif-card:hover { border-color:var(--line-strong); transform:translateX(2px); }
    .notif-card.is-unread { border-left:3px solid var(--red); }
    .notif-icon { width:42px; height:42px; border-radius:10px; display:grid; place-items:center; font-size:1.25rem; flex-shrink:0; }
    .notif-icon.type-event   { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.2); }
    .notif-icon.type-project { background:rgba(34,197,94,.1);  border:1px solid rgba(34,197,94,.2); }
    .notif-icon.type-mentor  { background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.2); }
    .notif-icon.type-profile { background:rgba(227,27,45,.1);  border:1px solid rgba(227,27,45,.2); }
    .notif-icon.type-system  { background:var(--bg-3); border:1px solid var(--line); }
    .notif-icon.type-news    { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.2); }
    .notif-body { flex:1; min-width:0; }
    .notif-title { font-size:.9375rem; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:.2rem; }
    .notif-desc  { font-size:.8375rem; color:var(--text-2); line-height:1.5; margin-bottom:.35rem; }
    .notif-time  { font-size:.75rem; color:var(--text-3); }
    .notif-dot   { position:absolute; top:.85rem; right:.85rem; width:7px; height:7px; border-radius:50%; background:var(--red); }
    .notif-card.is-read .notif-dot { display:none; }

    /* Empty state */
    .notif-empty { text-align:center; padding:3rem 1rem; color:var(--text-3); }
    .notif-empty-icon { font-size:3rem; margin-bottom:1rem; }
    .notif-empty p { margin:0; font-size:.9375rem; }

    /* Bottom nav */
    .bottom-nav { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:200; height:calc(3.75rem + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:var(--bg-2); border-top:1px solid var(--line-strong); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%); }
    .bn-inner { width:100%; display:flex; align-items:stretch; }
    .bn-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.22rem; padding:.55rem .25rem .45rem; cursor:pointer; border:none; background:none; color:var(--text-3); font-family:var(--font-body); font-size:.6rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; text-decoration:none; -webkit-tap-highlight-color:transparent; position:relative; transition:color .2s var(--ease); }
    .bn-item:active { transform:scale(.88); }
    .bn-item.is-active { color:var(--red); }
    .bn-item.is-active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2px; background:var(--red); border-radius:0 0 3px 3px; animation:bn-pill-in .28s var(--ease) both; }
    @keyframes bn-pill-in { from{width:0;opacity:0} to{width:28px;opacity:1} }
    .bn-icon { width:26px; height:26px; display:grid; place-items:center; border-radius:6px; transition:background .2s var(--ease),transform .2s var(--ease); }
    .bn-item:hover .bn-icon { background:rgba(227,27,45,.1); transform:translateY(-1px); }
    .bn-item.is-active .bn-icon { background:rgba(227,27,45,.12); }
    .bn-icon svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-icon svg { stroke-width:2.25; }
    .bn-badge { position:absolute; top:.45rem; left:calc(50% + 3px); min-width:14px; height:14px; padding:0 3px; background:var(--red); color:#fff; font-size:.5rem; font-weight:700; line-height:14px; text-align:center; border-radius:7px; border:1.5px solid var(--bg-2); display:none; }
    .bn-badge.visible { display:block; }
    .bn-avatar { width:26px; height:26px; border-radius:50%; object-fit:cover; border:1.5px solid var(--line-strong); display:block; }
    .bn-avatar-default { width:26px; height:26px; border-radius:50%; background:var(--bg-3); border:1.5px solid var(--line-strong); display:grid; place-items:center; }
    .bn-avatar-default svg { width:14px; height:14px; stroke:var(--text-3); fill:none; stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round; }
    .bn-item.is-active .bn-avatar-default svg { stroke:var(--red); }

    @media (max-width:800px) { .dash-header{padding:1rem;} .dash-body{padding:2rem 1rem; padding-bottom:calc(5rem + env(safe-area-inset-bottom,0px)) !important;} }
  </style>
</head>
<body>

<div class="page-loader" id="page-loader">
  <div class="loader-inner"><div class="loader-ring"></div><div class="loader-label">Loading…</div></div>
</div>
<div id="toast-root" aria-live="polite"></div>

<header class="dash-header">
  <a href="dashboard.html">
    <img class="dash-logo" src="https://cdn.imageurlgenerator.com/uploads/7a3264f2-9a1f-4fe7-a124-da445f285aab.png" alt="Genesis Incubation Centre" width="180" height="44" />
  </a>
  <div class="dash-header-right">
    <button class="theme-btn-dash" id="theme-toggle" aria-label="Toggle theme"><span id="theme-icon">☾</span></button>
    <button class="logout-btn" id="logout-btn">Log out</button>
  </div>
</header>

<div class="dash-body">
  <p class="dash-eyebrow">Activity</p>
  <div class="dash-title-row">
    <h1 class="dash-title">Notifications</h1>
    <button class="mark-all-btn" id="mark-all-btn">Mark all read</button>
  </div>
  <div id="notif-container"><!-- populated by JS --></div>
</div>

<nav class="bottom-nav" aria-label="Mobile navigation">
  <div class="bn-inner">
    <a class="bn-item" href="index.html" data-bn="home"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span><span>Home</span></a>
    <a class="bn-item" href="search.html" data-bn="search"><span class="bn-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><span>Search</span></a>
    <a class="bn-item" href="news.html" data-bn="news"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14H12M18 10H12M18 18H12"/></svg></span><span>News</span></a>
    <a class="bn-item is-active" href="notification.html" data-bn="notifs"><span class="bn-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span><span>Alerts</span></a>
    <a class="bn-item" data-bn="profile" id="bn-profile-tab" href="dashboard.html"><span class="bn-avatar-default" id="bn-avatar-default"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Profile</span></a>
  </div>
</nav>

<script type="module">
const SESSION_KEY = 'gic_session';
const NOTIF_KEY   = 'gic_notifications_read';

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch { return null; }
}
function clearSession() { sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(SESSION_KEY); }

function toast(msg, type = 'info') {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  el.innerHTML = `<span style="color:${type==='error'?'var(--red)':type==='success'?'#22c55e':'var(--text-2)'}">${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  root.appendChild(el);
  requestAnimationFrame(() => el.classList.add('in'));
  el.addEventListener('click', () => el.remove());
  setTimeout(() => { el.classList.remove('in'); setTimeout(() => el.remove(), 350); }, 3500);
}

function initTheme() {
  const saved = localStorage.getItem('gic_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const i = document.getElementById('theme-icon');
  if (i) i.textContent = saved === 'dark' ? '☀' : '☾';
  document.getElementById('theme-toggle')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.classList.add('theme-anim');
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('gic_theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀' : '☾';
    setTimeout(() => document.documentElement.classList.remove('theme-anim'), 500);
  });
}

/*
 * NOTIFICATIONS DATA
 * Future: fetch from Supabase:
 * const { data } = await supabase
 *   .from('notifications')
 *   .select('*')
 *   .eq('user_id', session.id)
 *   .order('created_at', { ascending: false });
 */
const BASE_NOTIFICATIONS = [
  { id:1,  type:'event',   icon:'🎙️', title:'New Event: Startup Saturday — June 15', desc:'Join us for the monthly Demo Day in the GIC Auditorium. 8 teams will be presenting!', time:'2 hours ago', group:'Today' },
  { id:2,  type:'project', icon:'✅', title:'Project "AgroSense" status updated', desc:'Your project has been moved to Active status by the GIC admin team.', time:'5 hours ago', group:'Today' },
  { id:3,  type:'mentor',  icon:'👨‍🏫', title:'Mentor session scheduled', desc:'Dr. Rajesh Kumar has confirmed a mentorship slot for you on June 12 at 11:00 AM.', time:'Yesterday', group:'Yesterday' },
  { id:4,  type:'profile', icon:'🎉', title:'Profile 100% complete!', desc:'Great work — your GIC profile is fully filled out. You are now eligible for all programme benefits.', time:'2 days ago', group:'This week' },
  { id:5,  type:'news',    icon:'📢', title:'GIC partners with NASSCOM 10,000 Startups', desc:'Your startup may now be eligible for national-level support and investor access.', time:'3 days ago', group:'This week' },
  { id:6,  type:'event',   icon:'🏆', title:'Hackathon result announced', desc:'Congratulations to Team AgroSense for winning Smart India Hackathon 2024!', time:'4 days ago', group:'This week' },
  { id:7,  type:'system',  icon:'🔔', title:'New cohort applications open', desc:'GIC Cohort 5 applications are now live. Deadline: June 30, 2025.', time:'1 week ago', group:'Earlier' },
  { id:8,  type:'mentor',  icon:'💼', title:'New mentors joined the network', desc:'Three new industry mentors are now available for booking via the GIC portal.', time:'1 week ago', group:'Earlier' },
];

function getReadSet() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveReadSet(s) { localStorage.setItem(NOTIF_KEY, JSON.stringify([...s])); }

function markRead(id) {
  const s = getReadSet(); s.add(id); saveReadSet(s);
}
function markAllRead() {
  const s = new Set(BASE_NOTIFICATIONS.map(n => n.id)); saveReadSet(s);
}

function renderNotifications() {
  const readSet = getReadSet();
  const groups = {};
  BASE_NOTIFICATIONS.forEach(n => {
    if (!groups[n.group]) groups[n.group] = [];
    groups[n.group].push({ ...n, read: readSet.has(n.id) });
  });

  let html = '';
  Object.entries(groups).forEach(([label, notifs]) => {
    html += `<div class="notif-group"><div class="notif-group-label">${label}</div>`;
    notifs.forEach(n => {
      html += `<div class="notif-card ${n.read ? 'is-read' : 'is-unread'}" data-id="${n.id}" onclick="handleNotifClick(${n.id})">
        <div class="notif-icon type-${n.type}">${n.icon}</div>
        <div class="notif-body">
          <div class="notif-title">${n.title}</div>
          <div class="notif-desc">${n.desc}</div>
          <div class="notif-time">${n.time}</div>
        </div>
        ${!n.read ? '<div class="notif-dot"></div>' : ''}
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('notif-container').innerHTML = html || `<div class="notif-empty"><div class="notif-empty-icon">🔔</div><p>No notifications yet</p></div>`;
}

window.handleNotifClick = function(id) {
  markRead(id);
  const card = document.querySelector(`.notif-card[data-id="${id}"]`);
  if (card) {
    card.classList.remove('is-unread');
    card.classList.add('is-read');
    const dot = card.querySelector('.notif-dot');
    if (dot) dot.remove();
  }
};

function initNavAvatar(session) {
  if (!session?.avatar) return;
  const def = document.getElementById('bn-avatar-default');
  if (!def) return;
  const img = document.createElement('img');
  img.className = 'bn-avatar'; img.src = session.avatar; img.alt = 'Profile';
  def.replaceWith(img);
}

document.addEventListener('DOMContentLoaded', () => {
  initTheme();
  const session = getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  initNavAvatar(session);
  renderNotifications();

  document.getElementById('mark-all-btn')?.addEventListener('click', () => {
    markAllRead();
    renderNotifications();
    toast('All notifications marked as read', 'success');
  });

  document.getElementById('logout-btn')?.addEventListener('click', () => { clearSession(); window.location.href = 'login.html'; });

  const loader = document.getElementById('page-loader');
  if (loader) { loader.classList.add('is-done'); loader.setAttribute('aria-hidden','true'); }
});
</script>
</body>
</html>
